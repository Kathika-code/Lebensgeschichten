<script>
    var map_84677abc75ee085b8c0ce89a368ea0a2 = L.map("map_84677abc75ee085b8c0ce89a368ea0a2", {
        center: [47.0707, 15.4395],
        zoom: 14,
        zoomControl: true,
        preferCanvas: false,
    });

    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        minZoom: 0,
        maxZoom: 19,
        maxNativeZoom: 19,
        attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors",
        subdomains: "abc",
        detectRetina: false,
        tms: false,
        opacity: 1,
    }).addTo(map_84677abc75ee085b8c0ce89a368ea0a2);

    function createMarker(lat, lng, color, title, text, imgUrl) {
        var icon = L.AwesomeMarkers.icon({
            icon: 'shopping-cart',
            markerColor: color,
            prefix: 'fa'
        });

        var popupContent = `
            <div style="text-align:center;">
                <strong>${title}</strong><br>
                <img src="${imgUrl}" alt="${title}" style="width:100%; max-width:200px; margin:10px 0;"><br>
                <span style="font-size:0.9rem;">${text}</span>
            </div>
        `;

        L.marker([lat, lng], {icon: icon})
            .bindPopup(popupContent)
            .addTo(map_84677abc75ee085b8c0ce89a368ea0a2);
    }

    createMarker(
        47.07121, 15.42506, 'purple',
        "Farmah's Indien Supermarket",
        "Seit 23 Jahren betreibt die Familie Farmah den Supermarkt. Die Kundschaft ist bunt gemischt: neben der indischen Community gibt es auch viele afrikanische, südamerikanische, mexikanische und auch österreichische KundInnen. - Amet Farmah",
        "https://www.annenpost.at/wp-content/uploads/2025/01/Amet-Farmah.jpg"
    );

    createMarker(
        47.06410, 15.43148, 'orange',
        "Estan Supermarket",
        "Estan Supermarket mit einer großen Vielfalt an Produkten. Öffnungszeiten: Mo-Fr: 8-19 Uhr/Sa: 8-18 Uhr",
        "https://www.etsan.at/wp-content/uploads/2025/05/493516902_1108961574597855_6499456158449619481_n.jpg"
    );

    createMarker(
        47.06632, 15.42720, 'green',
        "Aka Chukuwu Afroshop",
        "Afrikanischer Supermarkt:Essen, Kosmetik, Getränke und mehr!",
        "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGpNmH5DoCXNDAQBK_NlpXGLOxlHnq-nx-Rw&s"
    );

    createMarker(
        47.07006, 15.43201, 'gray',
        "Mama Lee Afroshop",
        "\"Mama Lee ist einfach perfekt! Preis, Leistungs Verhältnis passt und man fühlt sich bei ihr in guten Händen. Salon ist wie ein Stück aus Afrika und der Flair deshalb sehr familiär! Frisur top und voll zufrieden!\" - Review",
        "https://www.annenpost.at/wp-content/uploads/2017/02/Mama-e1485960288292.jpg"
    );
</script>
